# This is a Databricks asset bundle definition for big_data_ddc.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: big_data_ddc
  # uuid: 987e48b2-f9b7-4be3-909d-6f2e0a90f95c

include:
  - resources/config/*.yml
  - resources/jobs/*.yml
  - resources/pipelines/*.yml
  # get all items in resource folder
  # - resource/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
# variables:
#   catalog:
#     description: The catalog to use
#   schema:
#     description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405606262968015.15.azuredatabricks.net
      root_path: ~/big_data_ddc
    presets:
      trigger_pause_status: PAUSED
    # variables:
    #   catalog: dev
    #   schema: dev
    # presets:
    #   artifacts_dynamic_version: true
  qa:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: production
    workspace:
      host: https://adb-7405619079163072.12.azuredatabricks.net/
      root_path: ~/Shared/big_data_ddc
    presets:
      trigger_pause_status: PAUSED
    # variables:
    #   catalog: dev
    #   schema: dev
    # presets:
    #   artifacts_dynamic_version: true
  prod:
    mode: production
    workspace:
      host: https://adb-7405611821384379.19.azuredatabricks.net/
      root_path: ~/Shared/big_data_ddc
    presets:
      trigger_pause_status: PAUSED
      # We explicitly deploy to /Workspace/Users/dias_sth@hotmail.com to make sure we only have a single copy.
